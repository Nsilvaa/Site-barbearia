<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos disponíveis</title>
    <link rel="stylesheet" href="/style.css">

</head>
<body>
    
     <section class="haircuts">

      <div class="haircut" data-aos="fade-up" data-aos-delay="150">
        <img
          src="assets/GTA-6-Grand-Theft-Auto-VI-Outdoor-Marketing-2026.webp"
          alt="GTA 6"
        />
        <div class="haircut-info">
          <strong>GTA 6</strong>
         
          <button>
            R$ 800,00
          </button>
        </div>
      </div>

      <div class="haircut" data-aos="fade-up" data-aos-delay="150">
        <img
          src="assets/Resident-Evil-Requiem-–-PS5-–-Midia-Digital-fonte-dos-games.png"
          alt="Resident evil 9"
        />
        <div class="haircut-info">
          <strong>Resident evil 9</strong>
          <button>
            R$ 600,00
          </button>
        </div>
      </div>

      <div class="haircut" data-aos="fade-up" data-aos-delay="400">
        <img
          src="assets/d92d2967-799a-48f8-941c-9d88ca6dcb5c.jpg"
          alt="Fallout 76"
        />
        <div class="haircut-info">
          <strong>Fallout 76</strong>
          <button>
            R$ 550,00
          </button>
        </div>
      </div>

    </section>

</body>
</html>
